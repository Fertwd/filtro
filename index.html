<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eclipse Motion - Photobooth</title>
    <link rel="icon" type="image/png" href="./img/logo.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app-container">
        <video id="input-video" playsinline autoplay></video>
        <canvas id="output-canvas"></canvas>

        <div id="ui-layer">
            <header id="top-bar">
                <img src="./img/logo.png" alt="Eclipse" id="brand-logo">
            </header>
            
            <div id="start-screen">
                <button id="start-btn" class="glow-button">ACTIVAR CÁMARA</button>
            </div>

            <div id="camera-controls" class="hidden">
                <div class="camera-footer">
                    <div class="watermark">✨ MODO XV AÑOS/CUMPLEAÑOS ✨</div>
                    <button id="capture-btn"></button>
                </div>
            </div>
        </div>

        <div id="flash-overlay"></div>

        <div id="preview-screen" class="hidden">
            <button id="retake-btn" class="snap-top-btn">✕</button>
            <img id="preview-image" src="" alt="Tu foto">
            
            <div class="snap-bottom-actions">
                <button id="save-btn" class="snap-action-btn">
                    <span class="icon">📥</span> Guardar
                </button>
                <button id="share-btn" class="snap-action-btn primary">
                    Enviar <span class="icon">➔</span>
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
